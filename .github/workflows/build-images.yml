name: Build and Push Pre-built Images

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'Dockerfile.prebuilt'
      - 'dag_validation.py'
      - 'alert.py'
      - 'sarif_output.py'
      - 'entrypoint.sh'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        airflow_version: ['2.9.3', '2.10.4']
        python_version: ['3.11', '3.12']
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          push: true
          build-args: |
            PYTHON_VERSION=${{ matrix.python_version }}
            AIRFLOW_VERSION=${{ matrix.airflow_version }}
            AIRFLOW_EXTRAS=async,postgres,google,cncf.kubernetes
          tags: ghcr.io/${{ github.repository }}:py${{ matrix.python_version }}-af${{ matrix.airflow_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
